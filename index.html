<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Leonardo Arruda — Disciplinas e Aulas</title>
  <!-- Bootstrap 4 + Font Awesome (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS personalizado -->
  <link rel="stylesheet" href="css/style-simple.css">
</head>
<body>
  <a href="#main-content" class="sr-only sr-only-focusable">Pular para o conteúdo principal</a>
  <button id="toggleAriaHighlight" class="aria-toggle-btn" aria-label="Destacar elementos ARIA/WCAG">
    <i class="fa fa-universal-access" aria-hidden="true"></i>
    <span class="sr-only">Destacar acessibilidade</span>
  </button>

  <div class="app-wrapper">
    <header class="header_section long_section px-0" role="banner">
      <nav class="navbar navbar-expand-lg custom_nav-container" aria-label="Navegação principal">
        <a class="navbar-brand" href="#" id="home-link"><span>Leonardo Arruda</span></a>
      </nav>
    </header>
    <div class="divider"></div>
    <div class="main-layout">
      <aside class="disciplines-sidebar" aria-label="Disciplinas por categoria">
        <h2>Disciplinas</h2>
        <div id="dynamic-sidebar" class="disciplines-list-container">
          <div class="empty-state"><i class="fa fa-spinner fa-spin"></i><p>Carregando disciplinas...</p></div>
        </div>
      </aside>
      <main id="main-content" class="content-area" role="main">
        <div id="dynamic-content"><div class="empty-state"><i class="fa fa-spinner fa-spin"></i><p>Carregando...</p></div></div>
      </main>
    </div>
  </div>

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
